<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều khiển Robot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        .control {
            margin: 20px;
        }
        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
        .direction {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 10px;
            width: 200px;
            margin: 0 auto;
        }
        .direction button {
            width: 60px;
            height: 60px;
        }
        .forward { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .stop { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
        .backward { grid-column: 2; grid-row: 3; }
    </style>
</head>
<body>
    <h1>Điều khiển Robot Dò Line</h1>
    <div class="control">
        <div class="direction">
            <button class="forward" onclick="sendCommand('forward')">↑</button>
            <button class="left" onclick="sendCommand('left')">←</button>
            <button class="stop" onclick="sendCommand('stop')">■</button>
            <button class="right" onclick="sendCommand('right')">→</button>
            <button class="backward" onclick="sendCommand('backward')">↓</button>
        </div>
    </div>
    <div class="control">
        <button onclick="sendCommand('follow')">Bắt đầu dò line</button>
        <button onclick="sendCommand('manual')">Chế độ thủ công</button>
    </div>

    <script>
        function sendCommand(cmd) {
            fetch('/' + cmd)
                .then(response => response.text())
                .then(data => console.log(data))
                .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
